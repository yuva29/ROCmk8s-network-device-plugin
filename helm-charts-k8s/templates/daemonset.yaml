apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Release.Name }}-device-plugin
  namespace: {{ .Release.Namespace }}
  labels:
  {{- include "helm-charts-network-dp.labels" . | nindent 4 }}
  {{- with .Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  updateStrategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: device-plugin
      daemonset-name: {{ .Release.Name }}-device-plugin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: device-plugin
        daemonset-name: {{ .Release.Name }}-device-plugin
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ .Values.serviceAccountName | default (printf "%s-device-plugin" .Release.Name) }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if hasKey .Values "hostNetwork" }}
      hostNetwork: {{ .Values.hostNetwork }}
      {{- else }}
      hostNetwork: true
      {{- end }}
      dnsPolicy: ClusterFirst
      priorityClassName: system-node-critical
      restartPolicy: Always
      schedulerName: default-scheduler
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: driver-init
          image: {{ .Values.image.initContainerImage }}
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              # Detect if running on VM or bare metal
              if grep -qi hypervisor /proc/cpuinfo; then
                IS_VM=true
                echo "Running on VM"
              else
                IS_VM=false
                echo "Running on bare metal"
              fi

              # Check if required drivers are ready based on environment
              drivers_not_ready() {
                if [ "$IS_VM" = "true" ]; then
                  [ ! -d /sys/class/infiniband ] || \
                  [ ! -d /sys/class/infiniband_verbs ] || \
                  [ ! -d /sys/module/ionic/drivers ]
                else
                  [ ! -d /sys/class/infiniband ] || \
                  [ ! -d /sys/class/infiniband_verbs ] || \
                  [ ! -d /sys/module/ionic/drivers ] || \
                  ([ ! -d /sys/module/tawk_ipc/drivers ] && [ ! -d /sys/module/pds_core/drivers ])
                fi
              }

              # Wait for all required drivers to be loaded
              while drivers_not_ready; do
                echo "Waiting for drivers to be loaded..."
                sleep 2
              done
              echo "All required drivers are ready"
          resources: {}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - name: sys
              mountPath: /sys
              readOnly: true
      containers:
        - name: {{ .Release.Name }}-device-plugin
          image: {{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}
          imagePullPolicy: {{ .Values.image.pullPolicy}}
          env:
          - name: DS_NODE_NAME
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: spec.nodeName
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - mountPath: /var/lib/kubelet/device-plugins
              name: kubelet-device-plugins
            - mountPath: /var/lib/kubelet/plugins_registry
              name: kubelet-plugins-registry
            - mountPath: /var/log
              name: var-log
            - mountPath: /var/run/k8s.cni.cncf.io/devinfo/dp
              name: device-info
            - mountPath: /etc/pcidp
              name: device-plugin-config-volume
            - mountPath: /var/lib/amd-metrics-exporter
              name: health
          workingDir: /root
      volumes:
        - hostPath:
            path: /var/lib/kubelet/device-plugins
            type: Directory
          name: kubelet-device-plugins
        - hostPath:
            path: /var/lib/kubelet/plugins_registry
            type: Directory
          name: kubelet-plugins-registry
        - hostPath:
            path: /var/log
            type: Directory
          name: var-log
        - hostPath:
            path: /var/run/k8s.cni.cncf.io/devinfo/dp
            type: DirectoryOrCreate
          name: device-info
        - configMap:
            defaultMode: 420
            name: {{ .Release.Name }}-device-plugin-config
          name: device-plugin-config-volume
        - hostPath:
            path: /var/lib/amd-metrics-exporter
            type: DirectoryOrCreate
          name: health
        - hostPath:
            path: /sys
            type: Directory
          name: sys

